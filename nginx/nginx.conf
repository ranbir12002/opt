events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 1. Route admin.lvh.me to superadmin-frontend
    server {
        listen 80;
        server_name admin.lvh.me;

        location / {
            proxy_pass http://superadmin-frontend:5174;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 2. Route api.lvh.me to chatbox-backend
    server {
        listen 80;
        server_name api.lvh.me;

        location / {
            proxy_pass http://chatbox-backend:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 3. Route lvh.me and all other subdomains (e.g., tenant1.lvh.me) to chatbox-frontend
    server {
        listen 80;
        server_name *.lvh.me lvh.me;

        location / {
            proxy_pass http://chatbox-frontend:4173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}